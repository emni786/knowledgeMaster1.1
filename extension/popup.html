<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; width: 320px; padding: 14px; margin: 0; background: #0b0b0d; color: #f4f4f5; }
  h1 { font-size: 13px; margin: 0 0 10px; letter-spacing: .02em; opacity: .7; text-transform: uppercase; }
  .row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  label { font-size: 11px; opacity: .7; }
  input { width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 8px; border: 1px solid #2a2a2f; background: #15151a; color: inherit; font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .url { font-size: 11px; opacity: .7; word-break: break-all; padding: 8px 10px; background: #15151a; border-radius: 8px; max-height: 60px; overflow: auto; }
  button { width: 100%; padding: 10px 12px; border-radius: 8px; border: 0; background: #f4f4f5; color: #0b0b0d; font-weight: 600; font-size: 13px; cursor: pointer; }
  button:disabled { opacity: .6; cursor: default; }
  button.secondary { background: transparent; color: #f4f4f5; border: 1px solid #2a2a2f; margin-top: 6px; }
  .status { font-size: 12px; margin-top: 8px; min-height: 16px; }
  .ok { color: #22c55e; }
  .err { color: #f87171; }
  a { color: #93c5fd; }
  .hint { font-size: 11px; opacity: .7; margin-top: 6px; }
</style>
</head>
<body>
<h1>Knowledgemaster</h1>
<div id="setup" style="display:none">
  <div class="row">
    <label for="apiUrl">App URL</label>
    <input id="apiUrl" type="url" placeholder="https://your-knowledgemaster.example.com" />
  </div>
  <div class="row">
    <label for="token">API token</label>
    <input id="token" type="password" placeholder="km_..." autocomplete="off" />
  </div>
  <button id="saveSetup">Save settings</button>
  <div class="hint">Get a token from <span id="settingsHint">your app's Settings page</span>.</div>
</div>
<div id="main" style="display:none">
  <div class="row">
    <label>Current page</label>
    <div class="url" id="url"></div>
  </div>
  <button id="save">Save to library</button>
  <button id="reset" class="secondary">Change settings</button>
  <div class="status" id="status"></div>
</div>
<script src="popup.js"></script>
</body>
</html>
